<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Reason2 - Multimodal Inference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden>
        <div class="upload-placeholder" id="uploadPlaceholder">
            <span class="upload-icon">&#128247;</span>
            <p>Drag image here or click to upload</p>
            <p class="upload-hint">JPEG, PNG, or WebP (max 8 MB)</p>
        </div>
        <img id="imagePreview" class="image-preview" alt="Preview" hidden>
    </div>

    <div id="resultOverlay" class="result-overlay" hidden>
        <button id="closeResult" class="close-result" type="button" aria-label="Close">&times;</button>
        <div id="answerText" class="answer-text"></div>
        <div id="latencyDisplay" class="latency"></div>
    </div>

    <div id="loadingIndicator" class="loading" hidden>
        <div class="spinner"></div>
        <span>Analyzing image...</span>
    </div>

    <div class="prompt-bar">
        <textarea id="promptInput" rows="2" placeholder="Ask about the image..."></textarea>
        <button id="analyzeBtn" type="button" aria-label="Analyze">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <div class="prompt-bar-errors">
            <span class="error-message" id="imageError"></span>
            <span class="error-message" id="promptError"></span>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
