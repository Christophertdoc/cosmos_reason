<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Reason2 - Multimodal Inference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="video/mp4,video/webm,video/quicktime,.mp4,.webm,.mov" hidden>
        <div class="upload-placeholder" id="uploadPlaceholder">
            <span class="upload-icon">&#127909;</span>
            <p>Drag video here or click to upload</p>
            <p class="upload-hint">MP4, WebM, or MOV (max 50 MB, 2 min)</p>
        </div>
        <video id="videoPreview" class="video-preview" muted loop playsinline hidden></video>
    </div>

    <div id="resultOverlay" class="result-overlay" hidden>
        <button id="closeResult" class="close-result" type="button" aria-label="Close">&times;</button>
        <div id="answerText" class="answer-text"></div>
        <div id="latencyDisplay" class="latency"></div>
    </div>

    <div id="loadingIndicator" class="loading" hidden>
        <div class="spinner"></div>
        <span>Analyzing video...</span>
    </div>

    <div class="prompt-bar" id="promptBar" hidden>
        <textarea id="promptInput" rows="1" placeholder="Ask about the video..."></textarea>
        <button id="analyzeBtn" type="button" aria-label="Analyze">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <div class="prompt-bar-errors">
            <span class="error-message" id="videoError"></span>
            <span class="error-message" id="promptError"></span>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
