<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Reason2 - Multimodal Inference</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="container">
        <h1>Cosmos Reason2</h1>
        <p class="subtitle">Multimodal Image Analysis</p>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden>
            <div class="upload-placeholder" id="uploadPlaceholder">
                <span class="upload-icon">&#128247;</span>
                <p>Drag image here or click to upload</p>
                <p class="upload-hint">JPEG, PNG, or WebP (max 8 MB)</p>
            </div>
            <img id="imagePreview" class="image-preview" alt="Preview" hidden>
        </div>
        <div class="error-message" id="imageError"></div>

        <label for="promptInput">Prompt</label>
        <textarea id="promptInput" rows="3" placeholder="Describe what you want to know about the image..."></textarea>
        <div class="error-message" id="promptError"></div>

        <button id="analyzeBtn" type="button">Analyze</button>

        <div id="loadingIndicator" class="loading" hidden>
            <div class="spinner"></div>
            <span>Analyzing image...</span>
        </div>

        <div id="resultArea" class="result-area" hidden>
            <h2>Result</h2>
            <div id="answerText" class="answer-text"></div>
            <div id="latencyDisplay" class="latency"></div>
        </div>

        <div id="errorArea" class="error-area" hidden>
            <p id="errorText"></p>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
